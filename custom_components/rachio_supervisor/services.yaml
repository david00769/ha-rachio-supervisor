    schedule_name:
      name: Schedule name
      description: Fallback target when schedule entity id is not supplied.
      required: false
      selector:
        text:
    site_name:
      name: Site name
      description: Optional site label to disambiguate duplicate schedule names across entries.
      required: false
      selector:
        text:

clear_recommendation_acknowledgement:
  name: Clear recommendation acknowledgement
