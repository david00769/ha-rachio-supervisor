evaluate_now:
  name: Evaluate now
  description: Force a fresh linked Rachio evidence reconciliation immediately.
  target:
    entity:
      integration: rachio_supervisor

run_catch_up_now:
  name: Run catch-up now
  description: Run the current confirmed catch-up candidate for one site as an explicit operator action. This uses the same safety checks and duplicate lockout as automatic supervision.
  fields:
    site_name:
      name: Site name
      description: Optional site label to disambiguate duplicate loaded Rachio Supervisor entries.
      required: false
      selector:
        text:

quick_run_zone:
  name: Quick run zone
  description: Start one resolved Rachio zone for a bounded manual run. This is an explicit operator action and is not used by automatic Supervisor policy.
  fields:
    zone_entity_id:
      name: Zone entity
      description: Preferred target when a dashboard card is tied directly to a Rachio zone switch.
      required: false
      selector:
        entity:
          domain: switch
    schedule_entity_id:
      name: Schedule entity
      description: Stable schedule target when the Supervisor can resolve the matching zone.
      required: false
      selector:
        entity:
          integration: rachio_supervisor
          domain: sensor
    schedule_name:
      name: Schedule name
      description: Fallback target when entity ids are not supplied.
      required: false
      selector:
        text:
    duration_minutes:
      name: Duration
      description: Manual run duration in minutes.
      required: false
      default: 3
      selector:
        number:
          min: 1
          max: 60
          mode: box
          unit_of_measurement: min
    site_name:
      name: Site name
      description: Optional site label to disambiguate duplicate loaded Rachio Supervisor entries.
      required: false
      selector:
        text:

write_moisture_now:
  name: Write moisture now
  description: Write the currently mapped Home Assistant moisture value into the resolved Rachio zone for one schedule. This updates Rachio's moisture estimate; it does not start watering.
  fields:
    schedule_entity_id:
      name: Schedule entity
      description: Preferred stable target. Use the supervisor schedule entity id when available.
      required: false
      selector:
        entity:
          integration: rachio_supervisor
          domain: sensor
    schedule_name:
      name: Schedule name
      description: Fallback target when schedule entity id is not supplied.
      required: false
      selector:
        text:
    site_name:
      name: Site name
      description: Optional site label to disambiguate duplicate schedule names across entries.
      required: false
      selector:
        text:

write_recommended_moisture_now:
  name: Write recommended moisture now
  description: Write all currently recommended and ready Home Assistant moisture values into their resolved Rachio zones for one site. This updates Rachio moisture estimates; it does not start watering.
  fields:
    site_name:
      name: Site name
      description: Optional site label to disambiguate duplicate loaded Rachio Supervisor entries.
      required: false
      selector:
        text:

acknowledge_recommendation:
  name: Acknowledge recommendation
  description: Mark one current schedule recommendation as reviewed for the current runtime session.
  fields:
    schedule_entity_id:
      name: Schedule entity
      description: Preferred stable target. Use the supervisor schedule entity id when available.
      required: false
      selector:
        entity:
          integration: rachio_supervisor
          domain: sensor
    schedule_name:
      name: Schedule name
      description: Fallback target when schedule entity id is not supplied.
      required: false
      selector:
        text:
    site_name:
      name: Site name
      description: Optional site label to disambiguate duplicate schedule names across entries.
      required: false
      selector:
        text:

acknowledge_all_recommendations:
  name: Acknowledge all recommendations
  description: Mark all currently pending schedule recommendations as reviewed for one site in the current runtime session.
  fields:
    site_name:
      name: Site name
      description: Optional site label to disambiguate duplicate loaded Rachio Supervisor entries.
      required: false
      selector:
        text:

clear_recommendation_acknowledgement:
  name: Clear recommendation acknowledgement
  description: Return one current schedule recommendation to the active review queue for the current runtime session.
  fields:
    schedule_entity_id:
      name: Schedule entity
      description: Preferred stable target. Use the supervisor schedule entity id when available.
      required: false
      selector:
        entity:
          integration: rachio_supervisor
          domain: sensor
    schedule_name:
      name: Schedule name
      description: Fallback target when schedule entity id is not supplied.
      required: false
      selector:
        text:
    site_name:
      name: Site name
      description: Optional site label to disambiguate duplicate schedule names across entries.
      required: false
      selector:
        text:

clear_flow_alert_review:
  name: Clear flow alert review
  description: Clear Supervisor-side flow alert review only after a post-alert calibration returns a stable baseline close to the prior baseline.
  fields:
    rule_id:
      name: Rule id
      description: Optional flow alert rule_id from the flow alert sensor attributes. If omitted, all currently eligible normal-after-calibration items for the site are cleared.
      required: false
      selector:
        text:
    site_name:
      name: Site name
      description: Optional site label to disambiguate duplicate loaded Rachio Supervisor entries.
      required: false
      selector:
        text:
