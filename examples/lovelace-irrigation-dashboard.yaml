views:
  - type: sections
    max_columns: 3
    title: Shadow
    path: shadow
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Irrigation status
          - type: entities
            title: Irrigation status
            show_header_toggle: false
            entities:
              - entity: sensor.rachio_site_health
                name: Health
              - entity: sensor.rachio_site_webhook_health
                name: Webhook
              - entity: sensor.rachio_site_observed_rain_24h
                name: Rain 24h
              - entity: sensor.rachio_site_catch_up_evidence
                name: Catch-up
              - entity: sensor.rachio_site_last_catch_up_decision
                name: Last catch-up
              - entity: sensor.rachio_site_active_flow_alerts
                name: Flow
              - entity: sensor.rachio_site_recommended_moisture_writes
                name: Moisture
          - type: markdown
            content: |
              {% set reason = state_attr('sensor.rachio_site_health', 'supervisor_reason') or 'Runtime posture is not reported yet.' %}
              {% set missing = state_attr('sensor.rachio_site_health', 'missing_inputs') or [] %}
              {{ reason }}{% if missing %} Data warnings: {{ missing | join(', ') }}.{% endif %}
      - type: grid
        cards:
          - type: heading
            heading: Catch-up / top-up
          - type: markdown
            title: Recent decisions
            content: |
              {% set rows = [
                ('Last run', 'sensor.rachio_site_last_run_event'),
                ('Last skip', 'sensor.rachio_site_last_skip_decision'),
                ('Last catch-up', 'sensor.rachio_site_last_catch_up_decision'),
                ('Last reconcile', 'sensor.rachio_site_last_reconciliation')
              ] %}
              {% for label, entity in rows %}
              {% set subject = state_attr(entity, 'subject') or 'Rachio Site' %}
              {% set brief = state_attr(entity, 'brief') or states(entity) %}
              {% set at_local = state_attr(entity, 'at_local') %}
              **{{ label }}**<br>
              {{ subject }}<br>
              `{{ brief }}`{% if at_local %} · `{{ at_local }}`{% endif %}

              {% endfor %}
      - type: grid
        cards:
          - type: heading
            heading: Moisture drift
          - type: entities
            title: Moisture drift
            show_header_toggle: false
            entities:
              - entity: sensor.rachio_site_recommended_moisture_writes
                name: Recommended writes
              - entity: sensor.rachio_site_ready_moisture_writes
                name: Ready writes
              - entity: sensor.rachio_site_last_moisture_write
                name: Last write
          - type: markdown
            content: |
              {% set items = state_attr('sensor.rachio_site_recommended_moisture_writes', 'moisture_review_items') or [] %}
              {% if items %}
              {% for item in items %}
              **{{ item.schedule_name }}**  
              {{ item.posture_note }} · `{{ item.moisture_band }}` · `{{ item.review_state }}`{% if item.moisture_write_back_ready %} · `{{ item.moisture_write_back_ready }}`{% endif %}
              {% if item.recommended_action %}{{ item.recommended_action }}{% endif %}

              {% endfor %}
              {% else %}
              No mapped schedule moisture review items yet.
              {% endif %}

              Writes are manual. No automatic top-up watering.
      - type: grid
        cards:
          - type: heading
            heading: Flow review
          - type: entities
            title: Flow review
            show_header_toggle: false
            entities:
              - entity: sensor.rachio_site_active_flow_alerts
                name: Active alerts
              - entity: sensor.rachio_site_flow_alert_queue
                name: Review queue
              - entity: sensor.rachio_site_last_flow_alert_decision
                name: Last decision
          - type: markdown
            content: |
              {% set alerts = state_attr('sensor.rachio_site_active_flow_alerts', 'flow_alerts') or [] %}
              {% if alerts %}
              {% for alert in alerts %}
              **{{ alert.zone_name or alert.subject or 'Flow alert' }}**<br>
              `{{ alert.status }}`{% if alert.delta_percent is defined %} · {{ alert.delta_percent }}% baseline delta{% endif %}<br>
              {{ alert.recommended_action or 'Review calibration before clearing.' }}

              {% endfor %}
              {% else %}
              No flow alerts needing review.
              {% endif %}
      - type: grid
        cards:
          - type: heading
            heading: Schedule detail
          - type: markdown
            content: |
              {% set items = state_attr('sensor.rachio_site_recommended_moisture_writes', 'moisture_review_items') or [] %}
              {% if items %}
              | Schedule | Band | Review | Write-back |
              | --- | --- | --- | --- |
              {% for item in items %}
              | {{ item.schedule_name }} | {{ item.moisture_band }} | {{ item.review_state }} | {{ item.moisture_write_back_ready }} |
              {% endfor %}
              {% else %}
              Schedule moisture detail appears after candidate sensors are mapped.
              {% endif %}
      - type: grid
        cards:
          - type: heading
            heading: Audit
          - type: entities
            title: Audit
            show_header_toggle: false
            entities:
              - entity: sensor.rachio_site_last_event
              - entity: sensor.rachio_site_last_run_event
              - entity: sensor.rachio_site_last_skip_decision
              - entity: sensor.rachio_site_last_reconciliation
              - entity: sensor.rachio_site_recommended_moisture_queue
              - entity: sensor.rachio_site_moisture_write_queue
              - entity: sensor.rachio_site_flow_alert_queue
cards: []
