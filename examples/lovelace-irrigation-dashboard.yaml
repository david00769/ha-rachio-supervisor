title: Irrigation
path: irrigation
icon: mdi:sprinkler-variant
type: sections
sections:
  - type: grid
    cards:
      - type: heading
        heading: Rachio Supervisor
        heading_style: title
      - type: markdown
        content: >
          Shadow-first dashboard. Keep the existing production irrigation cards
          live until these Supervisor tiles agree with the old Codex-published
          contract in real use. Replace the placeholder entity ids below with
          the entity ids generated by your installation.
      - type: tile
        entity: sensor.rachio_supervisor_health
        name: Supervisor health
      - type: tile
        entity: sensor.rachio_supervisor_webhook_health
        name: Webhook health
      - type: tile
        entity: sensor.rachio_supervisor_last_refresh
        name: Last refresh
      - type: tile
        entity: sensor.rachio_supervisor_actual_rain_24h
        name: Actual rain, 24h
      - type: tile
        entity: sensor.rachio_supervisor_action_posture
        name: Action posture
      - type: tile
        entity: sensor.rachio_supervisor_last_moisture_write
        name: Last moisture write
  - type: grid
    cards:
      - type: heading
        heading: Shadow Comparison
      - type: entities
        title: Old vs new parity contract
        entities:
          - entity: sensor.sugarloaf_rachio_supervisor_webhook_health
            name: Old / Webhook health
          - entity: sensor.rachio_supervisor_webhook_health
            name: New / Webhook health
          - entity: sensor.sugarloaf_rachio_supervisor_last_event
            name: Old / Last event
          - entity: sensor.rachio_supervisor_last_event
            name: New / Last event
          - entity: sensor.sugarloaf_rachio_supervisor_last_run_event
            name: Old / Last run event
          - entity: sensor.rachio_supervisor_last_run_event
            name: New / Last run event
          - entity: sensor.sugarloaf_rachio_supervisor_last_skip_decision
            name: Old / Last skip decision
          - entity: sensor.rachio_supervisor_last_skip_decision
            name: New / Last skip decision
          - entity: sensor.sugarloaf_rachio_supervisor_last_reconciliation
            name: Old / Last reconciliation
          - entity: sensor.rachio_supervisor_last_reconciliation
            name: New / Last reconciliation
          - entity: sensor.sugarloaf_rachio_observed_rain_24h
            name: Old / Observed rain 24h
          - entity: sensor.rachio_supervisor_observed_rain_24h
            name: New / Observed rain 24h
          - entity: sensor.sugarloaf_rachio_supervisor_catch_up_evidence
            name: Old / Catch-up evidence
          - entity: sensor.rachio_supervisor_catch_up_evidence
            name: New / Catch-up evidence
          - entity: sensor.sugarloaf_rachio_supervisor_last_catch_up_decision
            name: Old / Last catch-up decision
          - entity: sensor.rachio_supervisor_last_catch_up_decision
            name: New / Last catch-up decision
  - type: grid
    cards:
      - type: heading
        heading: Moisture Recommendations
  - type: grid
    cards:
      - type: heading
        heading: Flow Alert Review
      - type: tile
        entity: sensor.rachio_supervisor_active_flow_alert_count
        name: Active flow alerts
      - type: tile
        entity: sensor.rachio_supervisor_flow_alert_queue
        name: Flow alert queue
      - type: tile
        entity: sensor.rachio_supervisor_last_flow_alert_decision
        name: Last flow alert decision
      - type: markdown
        content: >
          Flow alerts stay active until a later native Rachio calibration is
          observed and the new baseline remains close to the prior baseline.
          Only then should the Supervisor review item be cleared.
  - type: grid
    cards:
      - type: heading
        heading: Moisture Recommendations
      - type: tile
        entity: sensor.rachio_supervisor_recommended_moisture_write_count
        name: Recommended moisture writes
      - type: tile
        entity: sensor.rachio_supervisor_recommended_moisture_write_queue
        name: Recommended moisture queue
      - type: tile
        entity: sensor.rachio_supervisor_active_recommendation_count
        name: Active recommendations
      - type: tile
        entity: sensor.rachio_supervisor_active_recommendation_queue
        name: Active review queue
      - type: tile
        entity: sensor.rachio_supervisor_acknowledged_recommendation_count
        name: Acknowledged recommendations
      - type: tile
        entity: sensor.rachio_supervisor_acknowledged_recommendation_queue
        name: Acknowledged review queue
      - type: tile
        entity: sensor.rachio_supervisor_ready_moisture_write_count
        name: Ready moisture writes
      - type: tile
        entity: sensor.rachio_supervisor_moisture_write_queue
        name: Moisture write queue
  - type: grid
    cards:
      - type: heading
        heading: Schedule Review
      - type: markdown
        content: >
          Use one group of schedule sensors per active Rachio schedule. The
          examples below show the intended pattern. Replace the entity ids with
          the actual generated schedule sensors for your installation.
      - type: entities
        title: Example schedule entity pattern
        entities:
          - entity: sensor.rachio_supervisor_lawn_summer_green_status
            name: Lawn - Summer Green / Status
          - entity: sensor.rachio_supervisor_lawn_summer_green_reason
            name: Lawn - Summer Green / Reason
          - entity: sensor.rachio_supervisor_lawn_summer_green_policy
            name: Lawn - Summer Green / Policy
          - entity: sensor.rachio_supervisor_lawn_summer_green_moisture
            name: Lawn - Summer Green / Moisture
          - entity: sensor.rachio_supervisor_lawn_summer_green_write_back
            name: Lawn - Summer Green / Write-back
          - entity: sensor.rachio_supervisor_lawn_summer_green_recommendation
            name: Lawn - Summer Green / Recommendation
          - entity: sensor.rachio_supervisor_lawn_summer_green_review
            name: Lawn - Summer Green / Review
          - entity: sensor.rachio_supervisor_lawn_summer_green_catch_up_candidate
            name: Lawn - Summer Green / Catch-up candidate
