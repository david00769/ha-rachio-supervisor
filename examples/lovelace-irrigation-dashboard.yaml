views:
  - type: sections
    max_columns: 3
    title: Irrigation
    path: irrigation
    sections:
      - type: grid
        cards:
          - type: custom:rachio-supervisor-zone-grid-card
            entity: sensor.rachio_site_zone_overview
            title: Zones
      - type: grid
        cards:
          - type: heading
            heading: Weather
          - type: tile
            entity: sensor.rachio_site_observed_rain_24h
            name: Rachio skip rain
            icon: mdi:weather-rainy
          - type: tile
            entity: sensor.rachio_site_actual_rain_24h
            name: Actual rain
            icon: mdi:rainfall
          - type: tile
            entity: sensor.rachio_site_catch_up_evidence
            name: Catch-up
            icon: mdi:sprinkler-variant
          - type: button
            name: Evaluate
            icon: mdi:refresh
            tap_action:
              action: call-service
              service: rachio_supervisor.evaluate_now
      - type: grid
        cards:
          - type: heading
            heading: Moisture
          - type: tile
            entity: sensor.rachio_site_recommended_moisture_writes
            name: Recommended writes
            icon: mdi:water-percent-alert
          - type: tile
            entity: sensor.rachio_site_ready_moisture_writes
            name: Ready writes
            icon: mdi:pencil-check
          - type: tile
            entity: sensor.rachio_site_last_moisture_write
            name: Last write
            icon: mdi:history
          - type: conditional
            conditions:
              - entity: sensor.rachio_site_recommended_moisture_writes
                state_not: "0"
            card:
              type: button
              name: Write recommended
              icon: mdi:water-percent
              tap_action:
                action: call-service
                confirmation:
                  text: Write every currently recommended and ready moisture value into Rachio. This does not start watering.
                service: rachio_supervisor.write_recommended_moisture_now
      - type: grid
        cards:
          - type: heading
            heading: Flow
          - type: tile
            entity: sensor.rachio_site_active_flow_alerts
            name: Alerts
            icon: mdi:pipe-leak
          - type: tile
            entity: sensor.rachio_site_last_flow_alert_decision
            name: Last review
            icon: mdi:check-decagram-outline
          - type: conditional
            conditions:
              - entity: sensor.rachio_site_active_flow_alerts
                state_not: "0"
            card:
              type: button
              name: Clear eligible
              icon: mdi:check-decagram-outline
              tap_action:
                action: call-service
                confirmation:
                  text: Clear only Supervisor review items eligible after normal post-alert calibration.
                service: rachio_supervisor.clear_flow_alert_review
      - type: grid
        cards:
          - type: heading
            heading: Audit
          - type: entities
            show_header_toggle: false
            entities:
              - entity: sensor.rachio_site_health
                name: Supervisor
              - entity: sensor.rachio_site_webhook_health
                name: Webhook
              - entity: sensor.rachio_site_last_event
              - entity: sensor.rachio_site_last_run_event
              - entity: sensor.rachio_site_last_skip_decision
              - entity: sensor.rachio_site_last_reconciliation
              - entity: sensor.rachio_site_zone_overview
              - entity: sensor.rachio_site_recommended_moisture_queue
              - entity: sensor.rachio_site_flow_alert_queue
cards: []
