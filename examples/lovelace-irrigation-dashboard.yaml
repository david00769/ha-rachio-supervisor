views:
  - type: sections
    max_columns: 3
    title: Shadow
    path: shadow
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Irrigation status
          - type: markdown
            title: Irrigation status
            content: |
              **Health** {{ states('sensor.rachio_site_health') }} ·
              **Webhook** {{ states('sensor.rachio_site_webhook_health') }} ·
              **Rain 24h** {{ states('sensor.rachio_site_observed_rain_24h') }} ·
              **Catch-up** {{ states('sensor.rachio_site_catch_up_evidence') }} ·
              **Moisture** {{ states('sensor.rachio_site_recommended_moisture_writes') }} ·
              **Flow** {{ states('sensor.rachio_site_active_flow_alerts') }}

              {% set reason = state_attr('sensor.rachio_site_health', 'supervisor_reason') or 'Runtime posture is not reported yet.' %}
              {% set missing = state_attr('sensor.rachio_site_health', 'missing_inputs') or [] %}
              {{ reason }}{% if missing %}

              **Needs setup:** {{ missing | join(', ') | replace('_', ' ') | replace('moisture sensor problem:', 'moisture sensor: ') }}.{% endif %}

              Health checks runtime. Webhook checks Rachio event delivery.
      - type: grid
        cards:
          - type: heading
            heading: Catch-up / top-up
          - type: markdown
            title: Recent decisions
            content: |
              {% set rows = [
                ('Last run', 'sensor.rachio_site_last_run_event'),
                ('Last skip', 'sensor.rachio_site_last_skip_decision'),
                ('Last catch-up', 'sensor.rachio_site_last_catch_up_decision'),
                ('Last reconcile', 'sensor.rachio_site_last_reconciliation')
              ] %}
              {% for label, entity in rows %}
              {% set subject = state_attr(entity, 'subject') or 'Rachio Site' %}
              {% set brief = state_attr(entity, 'brief') or states(entity) %}
              {% set at_local = state_attr(entity, 'at_local') %}
              **{{ label }}**<br>
              {{ subject }}<br>
              `{{ brief }}`{% if at_local %} · `{{ at_local }}`{% endif %}

              {% endfor %}
      - type: grid
        cards:
          - type: heading
            heading: Moisture drift
          - type: entities
            title: Moisture drift
            show_header_toggle: false
            entities:
              - entity: sensor.rachio_site_recommended_moisture_writes
                name: Recommended
              - entity: sensor.rachio_site_ready_moisture_writes
                name: Ready
              - entity: sensor.rachio_site_last_moisture_write
                name: Last write
          - type: markdown
            title: Moisture review
            content: |
              {% set items = state_attr('sensor.rachio_site_recommended_moisture_writes', 'moisture_review_items') or [] %}
              {% if items %}
              {% for item in items %}
              {% set action = item.get('recommended_action') or '' %}
              {% set action_labels = {
                'write_moisture_now': 'Write ready',
                'resolve_write_back': 'Resolve Rachio zone',
                'map_moisture_sensor': 'Map sensor',
                'repair_moisture_sensor': 'Repair sensor',
                'review_auto_catch_up': 'Review catch-up',
                'none': 'No write needed'
              } %}
              {% set action_label = item.get('recommended_action_label') or action_labels.get(action, action or 'Review') %}
              {% set band = item.get('moisture_band') %}
              {% set data_quality = item.get('data_quality') or ('sensor_' ~ band if band in ['missing', 'unavailable', 'non_numeric'] else none) %}
              {% set last_updated = item.get('moisture_last_updated') %}
              **{{ item.schedule_name }}**  
              {{ item.posture_note }} · `{{ band }}`{% if item.moisture_value and item.moisture_value not in ['unknown', 'unavailable'] %} · {{ item.moisture_value }}%{% endif %}{% if data_quality and data_quality != 'ok' %} · `{{ data_quality }}`{% endif %}<br>
              {{ action_label }}{% if item.moisture_write_back_ready %} · {{ item.moisture_write_back_ready }}{% endif %}{% if last_updated %} · updated {{ last_updated[11:16] }}{% endif %}

              {% endfor %}
              {% else %}
              No mapped schedule moisture review items yet.
              {% endif %}

              Manual writes only. No automatic top-up watering.
      - type: grid
        cards:
          - type: heading
            heading: Flow review
          - type: entities
            title: Flow review
            show_header_toggle: false
            entities:
              - entity: sensor.rachio_site_active_flow_alerts
                name: Active
              - entity: sensor.rachio_site_flow_alert_queue
                name: Queue
              - entity: sensor.rachio_site_last_flow_alert_decision
                name: Last decision
          - type: markdown
            content: |
              {% set alerts = state_attr('sensor.rachio_site_active_flow_alerts', 'flow_alerts') or [] %}
              {% if alerts %}
              {% for alert in alerts %}
              **{{ alert.zone_name or alert.subject or 'Flow alert' }}**<br>
              `{{ alert.status }}`{% if alert.delta_percent is defined %} · {{ alert.delta_percent }}% baseline delta{% endif %}<br>
              {% if alert.recommended_action == 'clear_review' %}Eligible to clear review{% else %}{{ alert.recommended_action or 'Review calibration before clearing.' }}{% endif %}

              {% endfor %}
              {% else %}
              No flow alerts needing review.
              {% endif %}
      - type: grid
        cards:
          - type: heading
            heading: Audit
          - type: entities
            title: Audit
            show_header_toggle: false
            entities:
              - entity: sensor.rachio_site_last_event
              - entity: sensor.rachio_site_last_run_event
              - entity: sensor.rachio_site_last_skip_decision
              - entity: sensor.rachio_site_last_reconciliation
              - entity: sensor.rachio_site_recommended_moisture_queue
              - entity: sensor.rachio_site_moisture_write_queue
              - entity: sensor.rachio_site_flow_alert_queue
cards: []
