name: Feature request
description: Propose a product or integration capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What operator problem is not handled well today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: Describe the desired behavior, action model, and evidence involved.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Config flow
        - Entities
        - Services
        - Dashboard package
        - Moisture model
        - Catch-up model
        - Docs

