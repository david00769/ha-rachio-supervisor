name: Bug report
description: Report a runtime or UX problem in Rachio Supervisor
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: setup
    attributes:
      label: Setup
      description: Include HA version, Rachio mode, rain entity source, and whether moisture write-back was enabled.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or diagnostics
      description: Paste sanitized snippets only.

